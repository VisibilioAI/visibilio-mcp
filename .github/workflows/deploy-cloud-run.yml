name: Deploy HTTP transport to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'spec/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsup.config.ts'
      - '.github/workflows/deploy-cloud-run.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target (prod or staging)'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to Cloud Run (${{ github.event.inputs.target || 'prod' }})
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: visibilio-ai-v2
      GCP_REGION: europe-west1
      SERVICE_NAME: ${{ github.event.inputs.target == 'staging' && 'visibilio-mcp-staging' || 'visibilio-mcp-prod' }}
      MAX_INSTANCES: ${{ github.event.inputs.target == 'staging' && '3' || '10' }}
      # Real upstream URLs for the Cloud Run service. The `*.visibilio.ai` aliases
      # are not yet provisioned (NXDOMAIN), so we hardcode the actual *.run.app /
      # *.vercel.app endpoints. Re-point to the alias when DNS lands.
      BACKEND_URL: ${{ github.event.inputs.target == 'staging' && 'https://visibilio-ai-backend-952474168989.europe-central2.run.app' || 'https://visibilio-ai-backend-prod-952474168989.europe-central2.run.app' }}
      GATEWAY_URL: ${{ github.event.inputs.target == 'staging' && 'https://visibilio-api-gateway-v2-staging.vercel.app' || 'https://visibilio-api-gateway-prod.vercel.app' }}
      FRONTEND_URL: ${{ github.event.inputs.target == 'staging' && 'https://visibilio-frontend-v2-staging.vercel.app' || 'https://visibilio-frontend-prod.vercel.app' }}
      OAUTH_CLIENT_ID: vco_adc0e9cc5157d9bd08517a1513b5ea92
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          source: .
          flags: |-
            --min-instances=0
            --max-instances=${{ env.MAX_INSTANCES }}
            --memory=256Mi
            --cpu=1
            --timeout=300
            --concurrency=80
            --allow-unauthenticated
            --service-account=github-actions@visibilio-ai-v2.iam.gserviceaccount.com
            --build-service-account=projects/visibilio-ai-v2/serviceAccounts/github-actions@visibilio-ai-v2.iam.gserviceaccount.com
          env_vars: |-
            VISIBILIO_BACKEND_URL=${{ env.BACKEND_URL }}
            VISIBILIO_GATEWAY_URL=${{ env.GATEWAY_URL }}
            VISIBILIO_FRONTEND_URL=${{ env.FRONTEND_URL }}
            VISIBILIO_OAUTH_CLIENT_ID=${{ env.OAUTH_CLIENT_ID }}

      - name: Smoke-test /health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          for i in 1 2 3 4 5; do
            if curl -sSf "$URL/health" | grep -q '"status":"ok"'; then
              echo "✓ /health OK on $URL"
              exit 0
            fi
            echo "  attempt $i: not yet, sleeping 5s"
            sleep 5
          done
          echo "✗ /health never responded"
          exit 1
